<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>罗宾出海 — 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#1e293b}
.header{background:#0f172a;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:600}
.header .user{font-size:13px;opacity:.8}
.nav{display:flex;gap:4px;padding:12px 24px;background:#fff;border-bottom:1px solid #e2e8f0}
.nav button{padding:8px 20px;border:none;border-radius:8px;background:transparent;cursor:pointer;font-size:14px;color:#64748b}
.nav button.active{background:#0f172a;color:#fff}
.content{padding:24px;max-width:1200px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h3{font-size:15px;margin-bottom:16px;color:#0f172a}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #f1f5f9;font-size:13px}
th{color:#64748b;font-weight:500}
.tag{padding:2px 8px;border-radius:12px;font-size:12px;background:#dbeafe;color:#1e40af}
.tag.unlocked{background:#dcfce7;color:#166534}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px}
.btn-primary{background:#0f172a;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.login-box{max-width:360px;margin:120px auto}
.login-box input{width:100%;padding:12px;margin-bottom:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px}
.login-box .btn{width:100%;padding:14px;font-size:15px}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat{padding:16px;border-radius:12px;background:#fff;text-align:center}
.stat .num{font-size:28px;font-weight:700}
.stat .label{font-size:12px;color:#64748b}
.loading{text-align:center;padding:40px;color:#94a3b8}
.log-entry{padding:8px 12px;border-radius:8px;margin-bottom:8px;background:#f8fafc;font-size:13px}
.log-entry.failed{background:#fef2f2}
.pagination{display:flex;gap:8px;justify-content:center;margin-top:16px}
</style>
</head>
<body>

<div id="app">
  <div id="loginPage">
    <div class="login-box card">
      <h3 style="text-align:center;margin-bottom:24px">管理后台登录</h3>
      <input id="loginUser" placeholder="用户名" autocomplete="username">
      <input id="loginPass" type="password" placeholder="密码" autocomplete="current-password">
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
      <div id="loginError" style="color:#dc2626;text-align:center;margin-top:12px;font-size:13px"></div>
    </div>
  </div>

  <div id="mainPage" style="display:none">
    <div class="header">
      <h1>罗宾出海 · 管理后台</h1>
      <span class="user" id="headerUser"></span>
    </div>
    <div class="nav">
      <button onclick="switchTab('leads')" id="tab-leads" class="active">线索列表</button>
      <button onclick="switchTab('detail')" id="tab-detail">测评详情</button>
      <button onclick="switchTab('logs')" id="tab-logs">AI 日志</button>
    </div>
    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
const BASE = "";
let TOKEN = localStorage.getItem("admin_token") || "";
let currentTab = "leads";

if (TOKEN) showMain();

async function doLogin() {
  const u = document.getElementById("loginUser").value;
  const p = document.getElementById("loginPass").value;
  const err = document.getElementById("loginError");
  try {
    const r = await fetch(BASE + "/api/admin/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username:u, password:p})
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.detail || "登录失败"; return; }
    TOKEN = d.token;
    localStorage.setItem("admin_token", TOKEN);
    showMain();
  } catch(e) { err.textContent = "网络错误"; }
}

function showMain() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  document.getElementById("headerUser").textContent = "管理员";
  loadLeads();
}

function hdrs() { return {"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"} }

async function switchTab(t) {
  currentTab = t;
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
  if (t==="leads") loadLeads();
  else if (t==="detail") loadDetailForm();
  else if (t==="logs") loadLogs();
}

async function loadLeads(page=1) {
  const mc = document.getElementById("mainContent");
  mc.innerHTML = '<div class="loading">加载中...</div>';
  const r = await fetch(BASE+`/api/admin/leads?page=${page}&size=20`,{headers:hdrs()});
  const leads = await r.json();
  if (!Array.isArray(leads)) { mc.innerHTML = '<div class="loading">加载失败</div>'; return; }

  let html = '<div class="stats">';
  const total = leads.length;
  const unlocked = leads.filter(l=>l.is_unlocked).length;
  html += `<div class="stat"><div class="num">${total}</div><div class="label">线索总数</div></div>`;
  html += `<div class="stat"><div class="num">${unlocked}</div><div class="label">已解锁</div></div>`;
  html += '</div>';

  html += '<div class="card"><h3>线索列表</h3><table><thead><tr>';
  html += '<th>ID</th><th>姓名</th><th>联系方式</th><th>公司</th><th>身份</th><th>标签</th><th>解锁</th><th>操作</th>';
  html += '</tr></thead><tbody>';
  leads.forEach(l=>{
    html += `<tr>
      <td>${l.id}</td><td>${l.name||"-"}</td><td>${l.contact||"-"}</td>
      <td>${l.company||"-"}</td><td>${l.role||"-"}</td>
      <td><span class="tag">${l.tag||"-"}</span></td>
      <td><span class="tag${l.is_unlocked?' unlocked':''}">${l.is_unlocked?'已解锁':'未解锁'}</span></td>
      <td><button class="btn btn-sm btn-primary" onclick="loadAssessment(${l.assessment_id})">查看测评</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  mc.innerHTML = html;
}

async function loadDetailForm() {
  const mc = document.getElementById("mainContent");
  mc.innerHTML = `
    <div class="card">
      <h3>查看测评详情</h3>
      <div class="filter-bar">
        <input id="detailId" type="number" placeholder="输入测评 ID" style="width:200px">
        <button class="btn btn-primary" onclick="loadAssessment(document.getElementById('detailId').value)">查询</button>
      </div>
      <div id="detailResult"></div>
    </div>
  `;
}

async function loadAssessment(id) {
  switchTab("detail");
  document.getElementById("detailId").value = id;
  const mc = document.getElementById("detailResult");
  mc.innerHTML = '<div class="loading">加载中...</div>';
  const r = await fetch(BASE+`/api/admin/assessments/${id}`,{headers:hdrs()});
  const d = await r.json();
  if (!r.ok) { mc.innerHTML = `<div class="loading">${d.detail||'加载失败'}</div>`; return; }

  let html = '<div class="card"><h3>测评 #'+d.id+'</h3>';
  html += `<p>用户ID: ${d.user_id} | 状态: ${d.status}`;
  if (d.total_score) html += ` | 总分: ${d.total_score} | 标签: ${d.tag}`;
  html += `</p>`;

  if (d.report) {
    html += '<h4 style="margin-top:16px">报告摘要</h4>';
    const rpt = d.report;
    if (rpt.tag) html += `<p>标签: <span class="tag">${rpt.tag}</span> | 展示分: ${rpt.display_score||rpt.total_score}</p>`;
    if (rpt.hero) html += `<p>诊断: ${rpt.hero.one_sentence_judgment||""}</p>`;
    if (rpt.preliminary_judgment) html += `<p>综合判断: ${rpt.preliminary_judgment}</p>`;
  }

  if (d.answers && d.answers.length > 0) {
    html += '<h4 style="margin-top:16px">答案 ('+d.answers.length+'题)</h4>';
    html += '<table><thead><tr><th>题号</th><th>选项ID</th><th>分数</th></tr></thead><tbody>';
    d.answers.forEach(a=>{
      html += `<tr><td>${a.question_id}</td><td>${a.option_id||"-"}</td><td>${a.score}</td></tr>`;
    });
    html += '</tbody></table>';
  }

  html += '</div>';
  mc.innerHTML = html;
}

async function loadLogs(page=1) {
  const mc = document.getElementById("mainContent");
  mc.innerHTML = '<div class="loading">加载中...</div>';
  const r = await fetch(BASE+`/api/admin/ai-report-logs?page=${page}&size=50`,{headers:hdrs()});
  const logs = await r.json();
  if (!Array.isArray(logs)) { mc.innerHTML = '<div class="loading">加载失败</div>'; return; }

  let html = '<div class="card"><h3>AI 调用日志 ('+logs.length+'条)</h3>';
  logs.forEach(l=>{
    const cls = l.status==="failed"?"failed":"";
    html += `<div class="log-entry ${cls}">
      <strong>测评#${l.assessment_id}</strong> | ${l.model} | ${l.status||"pending"}
      ${l.latency_ms?` | ${l.latency_ms}ms`:""}
      ${l.error_message?`<br><span style="color:#dc2626">${l.error_message}</span>`:""}
      <span style="color:#94a3b8;float:right">${l.created_at||""}</span>
    </div>`;
  });
  html += '</div>';
  mc.innerHTML = html;
}
</script>
</body>
</html>
